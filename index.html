  <link rel="manifest" href="manifest.json" />

  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===================== CSS VARIABLES ===================== */
    :root {
      --primary: #0a3d62;
      --primary-light: #1a5276;
      --accent: #00b894;
      --accent2: #00cec9;
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #e8f0fe;
      --text: #1a202c;
      --text-muted: #718096;
      --border: #e2e8f0;
      --shadow: 0 4px 20px rgba(10,61,98,0.12);
      --nav-h: 64px;
      --header-h: 56px;
      --radius: 16px;
      --font-main: 'Nunito', sans-serif;
      --font-head: 'Poppins', sans-serif;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    /* ===================== DARK MODE ===================== */
    [data-theme="dark"] {
      --primary: #1a5276;
      --primary-light: #2471a3;
      --accent: #00b894;
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2333;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --border: #30363d;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* ===================== RESET & BASE ===================== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ===================== SPLASH SCREEN ===================== */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0a3d62 0%, #1a5276 40%, #00b894 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

    .splash-logo {
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.15);
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: splashPop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    .splash-logo svg { width: 60px; height: 60px; }

    .splash-title {
      font-family: var(--font-head);
      font-size: 26px; font-weight: 700;
      color: #fff; letter-spacing: 0.5px;
      animation: fadeUp 0.6s ease 0.5s both;
    }
    .splash-sub {
      font-size: 14px; color: rgba(255,255,255,0.75);
      margin-top: 6px;
      animation: fadeUp 0.6s ease 0.7s both;
    }
    .splash-loader {
      margin-top: 48px;
      width: 180px; height: 4px;
      background: rgba(255,255,255,0.2); border-radius: 4px;
      overflow: hidden;
      animation: fadeUp 0.6s ease 0.8s both;
    }
    .splash-loader-bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #00b894, #00cec9);
      border-radius: 4px;
      animation: loaderFill 2s ease 1s forwards;
    }

    @keyframes splashPop { from { opacity:0; transform: scale(0.5); } to { opacity:1; transform: scale(1); } }
    @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    @keyframes loaderFill { to { width: 100%; } }

    /* ===================== APP SHELL ===================== */
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #app.ready { opacity: 1; }

    /* ===================== HEADER ===================== */
    #header {
      height: var(--header-h);
      background: var(--primary);
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      position: relative; z-index: 100;
      flex-shrink: 0;
    }

    .header-logo {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 22px; height: 22px; }

    .header-title {
      flex: 1;
      font-family: var(--font-head);
      font-size: 16px; font-weight: 700;
      color: #fff; line-height: 1.2;
    }
    .header-title span { display: block; font-size: 11px; font-weight: 400; opacity: 0.75; }

    .header-btn {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.12);
      border: none; border-radius: 10px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      color: #fff; transition: background 0.2s;
      flex-shrink: 0;
    }
    .header-btn:hover { background: rgba(255,255,255,0.22); }
    .header-btn svg { width: 20px; height: 20px; }

    /* ===================== PROGRESS BAR ===================== */
    #progress-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      position: absolute; top: var(--header-h); left: 0;
      width: 0%; transition: width 0.3s ease;
      z-index: 99;
    }
    #progress-bar.loading { animation: progressPulse 1.5s ease infinite; }
    @keyframes progressPulse {
      0% { width: 10%; } 60% { width: 80%; } 100% { width: 90%; }
    }

    /* ===================== CONTENT AREA ===================== */
    #content {
      flex: 1; overflow: hidden; position: relative;
    }

    /* WebView iframe */
    #webview {
      width: 100%; height: 100%;
      border: none; display: block;
      background: var(--bg);
    }

    /* ===================== OFFLINE SCREEN ===================== */
    #offline-screen {
      position: absolute; inset: 0;
      background: var(--bg);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px; text-align: center;
    }
    #offline-screen.show { display: flex; }
    .offline-icon { font-size: 64px; }
    .offline-title { font-family: var(--font-head); font-size: 22px; font-weight: 700; color: var(--text); }
    .offline-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .retry-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border: none; border-radius: 12px;
      font-family: var(--font-main); font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 16px rgba(0,184,148,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,184,148,0.4); }

    /* ===================== BOTTOM NAVIGATION ===================== */
    #bottom-nav {
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      flex-shrink: 0;
      position: relative; z-index: 100;
    }

    .nav-item {
      flex: 1; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; cursor: pointer;
      border: none; background: transparent;
      color: var(--text-muted);
      font-family: var(--font-main);
      font-size: 11px; font-weight: 600;
      transition: color var(--transition);
      position: relative;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item.active::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 32px; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 0 0 4px 4px;
    }
    .nav-icon {
      width: 24px; height: 24px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .nav-item.active .nav-icon { transform: translateY(-2px); }
    .nav-item svg { width: 22px; height: 22px; }

    /* ===================== INSTALL BANNER ===================== */
    #install-banner {
      position: fixed; bottom: calc(var(--nav-h) + 12px); left: 12px; right: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 16px; padding: 14px 16px;
      display: none; align-items: center; gap: 12px;
      box-shadow: 0 8px 32px rgba(10,61,98,0.3);
      z-index: 200; animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    #install-banner.show { display: flex; }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    .banner-icon { font-size: 28px; flex-shrink: 0; }
    .banner-text { flex: 1; }
    .banner-text strong { display: block; color: #fff; font-size: 14px; font-weight: 700; }
    .banner-text span { color: rgba(255,255,255,0.75); font-size: 12px; }
    .banner-install {
      padding: 8px 16px;
      background: var(--accent);
      color: #fff; border: none; border-radius: 10px;
      font-family: var(--font-main); font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    .banner-close {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ===================== TOAST ===================== */
    #toast {
      position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1a202c; color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none; white-space: nowrap;
      transition: all 0.3s ease; z-index: 500;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===================== DARK MODE TOGGLE ANIMATION ===================== */
    .dark-toggle-icon { transition: transform 0.5s ease; }
    [data-theme="dark"] .dark-toggle-icon { transform: rotate(180deg); }
  </style>
</head>
<body>

  <!-- ===================== MAIN APP ===================== -->
  <div id="app">

    <!-- Header -->
    <div id="header">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
          <path d="M8 8h3a3 3 0 010 6H8V8z" fill="white" opacity="0.9"/>

  <!-- Toast -->

  <script>
    // ===================== STATE =====================
    const BLOG_URL = 'https://ankitstudypoint.blogspot.com';
    let deferredPrompt = null;
    let historyStack = [BLOG_URL + '/?m=1'];
    let currentNavId = 'nav-home';

    // Navigation URLs
    const NAV_URLS = {
      home:    BLOG_URL + '/?m=1',
      notes:   BLOG_URL + '/search/label/D%20Pharma%20Notes',
      tools:   BLOG_URL + '/p/drug-dose-calculator.html',
      search:  BLOG_URL + '/search',
      contact: BLOG_URL + '/p/contact-us_01586736301.html'
    };

    // ===================== SPLASH =====================
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        document.getElementById('app').classList.add('ready');
      }, 3000);
    });

    // ===================== DARK MODE =====================
    function toggleDarkMode() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      showToast(isDark ? '☀️ Light Mode' : '🌙 Dark Mode');
    }

    // Restore saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // ===================== NAVIGATION =====================
    function navigate(page) {
      const url = NAV_URLS[page];
      loadURL(url);

      // Update active nav
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('nav-' + page).classList.add('active');
      currentNavId = 'nav-' + page;

      historyStack.push(url);
    }

    function loadURL(url) {
      const iframe = document.getElementById('webview');
      startProgress();
      iframe.src = url;
    }

    // ===================== PROGRESS BAR =====================
    function startProgress() {
      const bar = document.getElementById('progress-bar');
      bar.style.width = '0%';
      bar.classList.add('loading');
    }

    function finishProgress() {
      const bar = document.getElementById('progress-bar');
      bar.classList.remove('loading');
      bar.style.width = '100%';
      setTimeout(() => { bar.style.width = '0%'; }, 400);
    }

    // ===================== IFRAME EVENTS =====================
    const iframe = document.getElementById('webview');

    iframe.addEventListener('load', () => {
      finishProgress();
      document.getElementById('offline-screen').classList.remove('show');

      // Inject mobile CSS into iframe for better reading
      try {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        if (iframeDoc) {
          const style = iframeDoc.createElement('style');
          style.textContent = `
            /* Mobile optimization injected by app */
            body { font-size: 16px !important; line-height: 1.7 !important; }
            img { max-width: 100% !important; height: auto !important; }
            pre, code { overflow-x: auto !important; white-space: pre-wrap !important; }
            table { width: 100% !important; overflow-x: auto !important; display: block; }
            .post-body { padding: 0 4px !important; }
            /* PDF download button styling */
            a[href$=".pdf"] {
              display: inline-flex !important; align-items: center !important;
              gap: 6px !important; padding: 8px 16px !important;
              background: linear-gradient(135deg, #0a3d62, #00b894) !important;
              color: white !important; border-radius: 8px !important;
              text-decoration: none !important; font-weight: 700 !important;
              margin: 4px 0 !important;
            }
            a[href$=".pdf"]::before { content: "📥 "; }
          `;
          iframeDoc.head.appendChild(style);

          // Intercept links inside iframe
          iframeDoc.addEventListener('click', (e) => {
            const a = e.target.closest('a');
            if (!a) return;
            const href = a.getAttribute('href');
            if (!href) return;

            // External link → open in new tab
            if (href.startsWith('http') && !href.includes('ankitstudypoint')) {
              e.preventDefault();
              window.open(href, '_blank');
              return;
            }

            // PDF → allow download
            if (href.endsWith('.pdf')) {
              // Let browser handle download
              return;
            }

            // Internal → load in iframe, push to history
            if (href.includes('ankitstudypoint') || href.startsWith('/')) {
              historyStack.push(href);
            }
          });
        }
      } catch(e) {
        // Cross-origin restriction — ignore silently
      }
    });

    // ===================== REFRESH =====================
    function refreshPage() {
      startProgress();
      iframe.src = iframe.src;
      showToast('🔄 Refreshing...');
    }

    // ===================== BACK BUTTON =====================
    window.addEventListener('popstate', handleBack);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') handleBack();
    });

    // Android back button via history API
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', function () {
      history.pushState(null, null, location.href);
      handleBack();
    });

    function handleBack() {
      if (historyStack.length > 1) {
        historyStack.pop();
        const prev = historyStack[historyStack.length - 1];
        startProgress();
        iframe.src = prev;
      } else {
        showToast('📌 Aap home page pe hain');
      }
    }

    // ===================== OFFLINE DETECTION =====================
    function checkConnection() {
      if (!navigator.onLine) {
        document.getElementById('offline-screen').classList.add('show');
        showToast('❌ Internet nahi hai');
      } else {
        document.getElementById('offline-screen').classList.remove('show');
      }
    }

    function retryConnection() {
      if (navigator.onLine) {
        document.getElementById('offline-screen').classList.remove('show');
        refreshPage();
      } else {
        showToast('❌ Still no internet...');
      }
    }

    window.addEventListener('offline', checkConnection);
    window.addEventListener('online', () => {
      document.getElementById('offline-screen').classList.remove('show');
      showToast('✅ Back online!');
      refreshPage();
    });

    // ===================== PWA INSTALL =====================
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => {
        document.getElementById('install-banner').classList.add('show');
      }, 3000);
    });

    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((result) => {
          if (result.outcome === 'accepted') showToast('🎉 App install ho raha hai!');
          deferredPrompt = null;
          closeBanner();
        });
      }
    }

    function closeBanner() {
      document.getElementById('install-banner').classList.remove('show');
    }

    window.addEventListener('appinstalled', () => {
      showToast('✅ App successfully installed!');
    });

    // ===================== TOAST =====================
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===================== SERVICE WORKER =====================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }

    // ===================== PUSH NOTIFICATIONS =====================
    async function requestNotificationPermission() {
      if ('Notification' in window) {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          showToast('🔔 Notifications enabled!');
          // Subscribe to push (requires backend – see guide)
        }
      }
    }

    // Ask after 10 seconds
    setTimeout(requestNotificationPermission, 10000);
  </script>

</body>
</html>
