<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offline – Ankit Study Point</title>
<style>
  body{margin:0;font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0a3d62,#00b894);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .card{background:white;border-radius:24px;padding:40px 32px;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
  .icon{font-size:80px;margin-bottom:16px;}
  h1{font-size:22px;color:#0a3d62;margin-bottom:8px;}
  p{color:#718096;font-size:14px;line-height:1.6;margin-bottom:24px;}
  .btn{padding:12px 28px;background:linear-gradient(135deg,#0a3d62,#00b894);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;}
  .btn:hover{opacity:0.9;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Internet Nahi Hai</h1>
  <p>Aap offline hain. Kripaya apna internet connection check karein aur dobara try karein.<br/><br/><em>You are offline. Please check your internet connection.</em></p>
  <button class="btn" onclick="window.location.reload()">🔄 Retry</button>
</div>
</body>
</html>
